<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Departments - Attendance System</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'departments')}">
        <section>
            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Department Management</h2>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDeptModal">
                        <i class="fas fa-plus"></i> Add Department
                    </button>
                </div>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>
                                            <a class="text-white text-decoration-none"
                                                th:href="@{/departments(sortField='id', sortDir=${sortField == 'id' ? reverseSortDir : sortDir})}">
                                                ID
                                                <span th:if="${sortField == 'id'}"
                                                    th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                                            </a>
                                        </th>
                                        <th>
                                            <a class="text-white text-decoration-none"
                                                th:href="@{/departments(sortField='name', sortDir=${sortField == 'name' ? reverseSortDir : sortDir})}">
                                                Name
                                                <span th:if="${sortField == 'name'}"
                                                    th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                                            </a>
                                        </th>
                                        <th>
                                            <a class="text-white text-decoration-none"
                                                th:href="@{/departments(sortField='description', sortDir=${sortField == 'description' ? reverseSortDir : sortDir})}">
                                                Description
                                                <span th:if="${sortField == 'description'}"
                                                    th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                                            </a>
                                        </th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="dept : ${departments}">
                                        <td th:text="${dept.id}">1</td>
                                        <td th:text="${dept.name}">Engineering</td>
                                        <td th:text="${dept.description}">Tech Team</td>
                                        <td>
                                            <button class="btn btn-warning btn-sm me-1" type="button"
                                                th:data-id="${dept.id}" th:data-name="${dept.name}"
                                                th:data-desc="${dept.description}" onclick="editDept(this)">
                                                Edit
                                            </button>
                                            <a th:href="@{/departments/delete/{id}(id=${dept.id})}"
                                                class="btn btn-danger btn-sm"
                                                onclick="return confirm('Delete this department?')">Delete</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Add/Edit Department Modal -->
                <div class="modal fade" id="addDeptModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <form action="/departments" method="post">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="modalTitle">Add Department</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <!-- Hidden ID field for updates -->
                                    <input type="hidden" id="deptId" name="id">
                                    <div class="mb-3">
                                        <label class="form-label">Name</label>
                                        <input type="text" id="deptName" name="name" class="form-control" required
                                            placeholder="e.g. HR">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Description</label>
                                        <input type="text" id="deptDesc" name="description" class="form-control"
                                            placeholder="e.g. Human Resources">
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">Close</button>
                                    <button type="submit" class="btn btn-primary">Save Department</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script>
            function editDept(btn) {
                var id = btn.getAttribute('data-id');
                var name = btn.getAttribute('data-name');
                var desc = btn.getAttribute('data-desc');

                document.getElementById('modalTitle').innerText = 'Edit Department';
                document.getElementById('deptId').value = id;
                document.getElementById('deptName').value = name;
                document.getElementById('deptDesc').value = desc;
                new bootstrap.Modal(document.getElementById('addDeptModal')).show();
            }

            // Reset modal on close
            document.getElementById('addDeptModal').addEventListener('hidden.bs.modal', function () {
                document.getElementById('modalTitle').innerText = 'Add Department';
                document.getElementById('deptId').value = '';
                document.getElementById('deptName').value = '';
                document.getElementById('deptDesc').value = '';
            });
        </script>
    </div>
</body>

</html>
