<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Change Password</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'dashboard')}">
        <section class="bg-light min-vh-100 d-flex align-items-center">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-md-5 col-lg-4">
                        <div class="card shadow-sm border rounded-1">
                            <div class="card-header bg-dark text-white p-4 rounded-top-1 text-center">
                                <div class="bg-white bg-opacity-10 rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center"
                                    style="width: 64px; height: 64px;">
                                    <i class="fas fa-key fa-2x text-white opacity-75"></i>
                                </div>
                                <h5 class="mb-0 fw-bold">Change Password</h5>
                                <p class="text-white-50 small mb-0">Secure your account</p>
                            </div>
                            <div class="card-body p-4">

                                <div th:if="${error}"
                                    class="alert alert-danger shadow-sm rounded-1 mb-4 border-danger border-opacity-25 bg-danger-subtle text-danger">
                                    <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${error}">Error</span>
                                </div>

                                <form action="/employee/change-password" method="post">
                                    <div class="mb-3">
                                        <label class="form-label text-muted small fw-bold text-uppercase"
                                            style="font-size: 0.75rem; letter-spacing: 0.5px;">Current Password</label>
                                        <div class="input-group">
                                            <span
                                                class="input-group-text bg-light border-end-0 text-muted rounded-start-1"><i
                                                    class="fas fa-lock"></i></span>
                                            <input type="password" name="oldPassword"
                                                class="form-control border-start-0 ps-0 rounded-end-1" required
                                                placeholder="Enter current password">
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label text-muted small fw-bold text-uppercase"
                                            style="font-size: 0.75rem; letter-spacing: 0.5px;">New Password</label>
                                        <div class="input-group">
                                            <span
                                                class="input-group-text bg-light border-end-0 text-muted rounded-start-1"><i
                                                    class="fas fa-key"></i></span>
                                            <input type="password" name="newPassword"
                                                class="form-control border-start-0 ps-0 rounded-end-1" required
                                                placeholder="Enter new password" minlength="4">
                                        </div>
                                        <div class="form-text small text-muted"><i
                                                class="fas fa-info-circle me-1"></i>Minimum 4 characters</div>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label text-muted small fw-bold text-uppercase"
                                            style="font-size: 0.75rem; letter-spacing: 0.5px;">Confirm New
                                            Password</label>
                                        <div class="input-group">
                                            <span
                                                class="input-group-text bg-light border-end-0 text-muted rounded-start-1"><i
                                                    class="fas fa-check-circle"></i></span>
                                            <input type="password" name="confirmPassword"
                                                class="form-control border-start-0 ps-0 rounded-end-1" required
                                                placeholder="Confirm new password">
                                        </div>
                                    </div>

                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-dark fw-bold py-2 rounded-1 shadow-sm">
                                            Update Password
                                        </button>
                                        <a href="/employee/dashboard"
                                            class="btn btn-outline-secondary py-2 rounded-1 border-0">Cancel</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script>
            // No specific scripts for this page
        </script>
    </div>
</body>

</html>
