<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:fragment="layout(content, scripts, activeLink)">

<head>
    <title>[[${companyName}]] Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/modern-theme.css" rel="stylesheet">
    <link href="/css/corporate-design-system.css" rel="stylesheet">

    <!-- CSRF Token for AJAX -->
    <meta name="_csrf" th:content="${_csrf.token}" th:if="${_csrf}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" th:if="${_csrf}" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Essential Layout Overrides Only - Global styles moved to modern-theme.css */

        /* Layout Structure */
        :root {
            --sidebar-width: 17rem;
            --sidebar-mini-width: 4.5rem;
        }

        #wrapper {
            overflow-x: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            /* Subtle global gradient */
            min-height: 100vh;
        }

        #sidebar-wrapper {
            min-height: 100vh;
            width: var(--sidebar-width);
            transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), margin-left 0.3s ease;
            position: relative;
            z-index: 1040;
            flex-shrink: 0;
        }

        #page-content-wrapper {
            flex-grow: 1;
            min-width: 0;
            /* Important for flex child to allow inner scroll */
            transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Mobile Default: Hidden off-screen */
        @media (max-width: 767.98px) {
            #sidebar-wrapper {
                position: fixed;
                margin-left: calc(var(--sidebar-width) * -1);
            }

            body.sb-sidenav-toggled #sidebar-wrapper {
                margin-left: 0;
            }
        }

        /* Desktop Default: Full width, toggles to mini-width */
        @media (min-width: 768px) {
            body.sb-sidenav-toggled #sidebar-wrapper {
                width: var(--sidebar-mini-width);
            }
        }
    </style>

    <!-- Smart Academic Infrastructure Unified Theme Injection -->
    <link rel="stylesheet" th:href="@{/css/smart-academic-theme.css}">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.self !== window.top || window.location.search.includes('embedded=true')) {
                document.documentElement.classList.add('embedded-mode');
            }
        });
    </script>
</head>


<body>

    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar(activeLink=${activeLink})}"></div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <div th:replace="~{fragments/topbar :: topbar}"></div>

            <div class="container-fluid px-4 py-4">
                <!-- Embedded Header/Navbar for embedded mode navigation -->
                <div class="embedded-navbar" sec:authorize="hasAnyRole('ADMIN', 'HR')">
                    <a href="/dashboard" class="embedded-nav-item" th:classappend="${activeLink == 'dashboard' ? 'active' : ''}">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                    <a href="/attendance" class="embedded-nav-item" th:classappend="${activeLink == 'attendance' ? 'active' : ''}">
                        <i class="fas fa-calendar-check"></i> Attendance
                    </a>
                    <a href="/employees" class="embedded-nav-item" th:classappend="${activeLink == 'employees' ? 'active' : ''}">
                        <i class="fas fa-users"></i> Members
                    </a>
                    <a href="/departments" class="embedded-nav-item" th:classappend="${activeLink == 'departments' ? 'active' : ''}">
                        <i class="fas fa-building"></i> Departments
                    </a>
                    <a href="/leave/manage" class="embedded-nav-item" th:classappend="${activeLink == 'leave-manage' ? 'active' : ''}">
                        <i class="fas fa-calendar-times"></i> Leave
                    </a>
                    <a href="/payroll" class="embedded-nav-item" th:classappend="${activeLink == 'payroll' ? 'active' : ''}">
                        <i class="fas fa-money-bill-wave"></i> Payroll
                    </a>
                    <a href="/admin/shifts" class="embedded-nav-item" th:classappend="${activeLink == 'shifts' ? 'active' : ''}">
                        <i class="fas fa-clock"></i> Shifts
                    </a>
                    <a href="/devices" class="embedded-nav-item" th:classappend="${activeLink == 'devices' ? 'active' : ''}">
                        <i class="fas fa-laptop"></i> Devices
                    </a>
                    <a href="/settings" class="embedded-nav-item" th:classappend="${activeLink == 'settings' ? 'active' : ''}">
                        <i class="fas fa-cogs"></i> Settings
                    </a>
                </div>
                
                <div class="embedded-navbar" sec:authorize="hasRole('EMPLOYEE')">
                    <a href="/employee/dashboard" class="embedded-nav-item" th:classappend="${activeLink == 'dashboard' ? 'active' : ''}">
                        <i class="fas fa-id-card"></i> My Dashboard
                    </a>
                    <a href="/employee/attendance/history" class="embedded-nav-item" th:classappend="${activeLink == 'history' ? 'active' : ''}">
                        <i class="fas fa-history"></i> My History
                    </a>
                    <a href="/leave/employee" class="embedded-nav-item" th:classappend="${activeLink == 'leave' ? 'active' : ''}">
                        <i class="fas fa-calendar-alt"></i> My Leave
                    </a>
                    <a href="/employee/payroll" class="embedded-nav-item" th:classappend="${activeLink == 'payroll' ? 'active' : ''}">
                        <i class="fas fa-money-bill-wave"></i> My Payslips
                    </a>
                    <a href="/employee/change-password" class="embedded-nav-item" th:classappend="${activeLink == 'change-password' ? 'active' : ''}">
                        <i class="fas fa-key"></i> Password
                    </a>
                </div>

                <!-- Content Injection -->
                <div th:replace="${content}"></div>
            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Sidebar Toggle Logic Global
        window.addEventListener('DOMContentLoaded', event => {
            const sidebarToggle = document.body.querySelector('#sidebarToggle');
            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', event => {
                    event.preventDefault();
                    document.body.classList.toggle('sb-sidenav-toggled');
                });
            }
        });
    </script>

    <!-- Global UX Scripts -->
    <script sec:authorize="hasRole('ADMIN')" src="/js/command-palette.js"></script>

    <!-- WebSocket Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script>
        // Real-Time Notifications (Simplified - Toasts Only)
        var stompClient = null;

        document.addEventListener('DOMContentLoaded', function () {
            connectWebSocket();
        });

        function connectWebSocket() {
            var socket = new SockJS('/ws-skylink');
            stompClient = Stomp.over(socket);
            stompClient.debug = null; // Disable debug logs
            stompClient.connect({}, function (frame) {
                console.log('Connected to Notification Service');
                stompClient.subscribe('/user/queue/notifications', function (notification) {
                    handleNotification(JSON.parse(notification.body));
                });
            });
        }

        function handleNotification(notification) {
            // Only Show Toast
            showToast(notification);
        }

        // Mark All Read (Used by History Page if needed, or define locally there)
        // History page has its own script logic or uses this? 
        // Logic in history.html: `onclick="markAllAsRead()"`
        // So we KEEP this function.
        function markAllAsRead() {
            fetch('/notifications/mark-all-read', {
                method: 'POST', headers: {
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                }
            }).then(response => {
                if (response.ok) {
                    // Reload to reflect changes if on history page
                    // layout doesn't know context, but simple reload is fine or just let page handle it?
                    // History page script had: .then(() => { location.reload(); });
                    // But it overrode window.markAllAsRead?
                    // Step 6139: "const originalMarkAll = window.markAllAsRead; window.markAllAsRead = function() { ... }"
                    // So History page handles its own reload.
                    // This global function is technically not used by Topbar anymore (button removed).
                    // But let's keep it as utility for History page to fallback/override.
                }
            }).catch(err => console.error('Error marking all read:', err));
        }

        function showToast(n) {
            // Create a toast element dynamically
            const toastContainer = document.getElementById('toastContainer');
            if (!toastContainer) createToastContainer();

            const toastId = 'toast-' + n.id;
            const bgClass = n.type === 'SUCCESS' ? 'text-bg-success' : (n.type === 'ERROR' ? 'text-bg-danger' : 'text-bg-light');

            // Use Modern Toast CSS
            const typeBorder = n.type === 'SUCCESS' ? 'toast-border-success' : (n.type === 'ERROR' ? 'toast-border-error' : (n.type === 'INFO' ? 'toast-border-info' : 'toast-border-warning'));

            const html = `
                <div id="${toastId}" class="toast toast-modern ${typeBorder} align-items-center mb-2" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body text-dark">
                            <strong class="d-block mb-1">${n.title}</strong>
                            <div class="small opacity-75">${n.message}</div>
                        </div>
                        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            `;

            document.getElementById('toastContainer').insertAdjacentHTML('beforeend', html);
            const toastEl = document.getElementById(toastId);
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toastContainer';
            container.className = 'toast-container position-fixed bottom-0 end-0 p-3';
            container.style.zIndex = '1050';
            document.body.appendChild(container);
        }
    </script>

    <!-- Page Specific Scripts -->
    <div th:replace="${scripts}"></div>

    <!-- Web Push Logic -->
    <script>
        async function enablePushNotifications() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                alert('Push notifications are not supported on this browser.');
                return;
            }

            // Register SW if not already (redundant if registered on load, but safe)
            const registration = await navigator.serviceWorker.ready;

            // Ask Permission
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                alert('Permission denied for notifications.');
                return;
            }

            // Get Public Key
            const response = await fetch('/push/public-key');
            const publicKey = await response.text();

            // Subscribe
            const convertedVapidKey = urlBase64ToUint8Array(publicKey);
            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: convertedVapidKey
            });

            // Send to Backend
            await fetch('/push/subscribe', {
                method: 'POST',
                body: JSON.stringify({
                    endpoint: subscription.endpoint,
                    keys: subscription.toJSON().keys
                }),
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                }
            });

            alert('Push notifications enabled!');
        }

        // Helper
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding)
                .replace(/\-/g, '+')
                .replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        // Register SW on load and sync subscription
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js').then(async function (registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);

                    // Check if already subscribed
                    const subscription = await registration.pushManager.getSubscription();
                    if (subscription) {
                        const csrfMeta = document.querySelector('meta[name="_csrf"]');
                        const headers = { 'Content-Type': 'application/json' };
                        if (csrfMeta) {
                            headers['X-CSRF-TOKEN'] = csrfMeta.content;
                        }

                        // Resync with backend (in case DB was reset or cache clear)
                        await fetch('/push/subscribe', {
                            method: 'POST',
                            body: JSON.stringify({
                                endpoint: subscription.endpoint,
                                keys: subscription.toJSON().keys
                            }),
                            headers: headers
                        }).catch(err => console.error('Failed to sync push subscription:', err));
                    }
                }, function (err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
