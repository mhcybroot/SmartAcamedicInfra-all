<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Clients</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'master-data-clients')}">
        <section class="bg-light min-vh-100">
            <div class="container-fluid px-4 md-px-5 py-4">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="mb-0 fw-bold text-dark tracking-tight">Manage Clients</h4>
                        <p class="text-muted small mb-0">Manage client relationships and accounts</p>
                    </div>
                    <div>
                        <a href="/master-data/clients/analytics" class="btn btn-outline-dark rounded-1 shadow-sm me-2">
                            <i class="fas fa-chart-pie me-2"></i>Analytics
                        </a>
                        <button class="btn btn-dark rounded-1 shadow-sm fs-6" data-bs-toggle="modal"
                            data-bs-target="#addClientModal">
                            <i class="fas fa-plus me-2"></i>Add Client
                        </button>
                    </div>
                </div>

                <!-- Success/Error Alerts -->
                <div th:if="${successMessage}"
                    class="alert alert-success alert-dismissible fade show rounded-1 border-success-subtle small"
                    role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}"
                    class="alert alert-danger alert-dismissible fade show rounded-1 border-danger-subtle small"
                    role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- Main Content Card -->
                <div class="card bg-white border rounded-1 shadow-sm">
                    <div class="card-header bg-white border-bottom py-3">
                        <div class="row align-items-center g-3">
                            <div class="col-md-6">
                                <h6 class="mb-0 text-uppercase text-secondary fw-bold small ls-1">
                                    <i class="fas fa-building me-2"></i>Client Directory
                                </h6>
                            </div>
                            <div class="col-md-6">
                                <form method="get" th:action="@{/master-data/clients}"
                                    class="d-flex justify-content-md-end">
                                    <div class="input-group input-group-sm" style="max-width: 300px;">
                                        <span class="input-group-text bg-light border-secondary-subtle rounded-start-1">
                                            <i class="fas fa-search text-muted"></i>
                                        </span>
                                        <input type="text" name="search"
                                            class="form-control border-secondary-subtle shadow-none"
                                            placeholder="Search by name, code..." th:value="${search}">
                                        <button type="submit"
                                            class="btn btn-outline-secondary border-secondary-subtle text-dark fw-bold rounded-end-1"
                                            th:if="${search == null || #strings.isEmpty(search)}">Go</button>
                                        <a th:if="${search != null && !#strings.isEmpty(search)}"
                                            href="/master-data/clients"
                                            class="btn btn-outline-secondary border-secondary-subtle text-muted rounded-end-1"
                                            title="Clear"><i class="fas fa-times"></i></a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr class="text-uppercase small text-secondary fw-semibold">
                                        <th class="ps-4 py-3" style="width: 80px;">ID</th>
                                        <th class="py-3" style="width: 150px;">Code</th>
                                        <th class="py-3">Name</th>
                                        <th class="py-3">Address</th>
                                        <th class="py-3" style="width: 100px;">Status</th>
                                        <th class="text-end pe-4 py-3" style="width: 200px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="client : ${clients}">
                                        <td class="ps-4 py-3 small text-muted" th:text="${client.id}">1</td>
                                        <td class="py-3">
                                            <span class="badge bg-primary-subtle text-primary rounded-1"
                                                th:text="${client.code}">CODE</span>
                                        </td>
                                        <td class="py-3">
                                            <span class="fw-semibold text-dark" th:text="${client.name}">Client
                                                Name</span>
                                        </td>
                                        <td class="py-3 text-muted small" th:text="${client.address ?: 'N/A'}">Address
                                        </td>
                                        <td class="py-3">
                                            <span th:if="${client.active}"
                                                class="badge bg-success-subtle text-success rounded-pill px-2">Active</span>
                                            <span th:unless="${client.active}"
                                                class="badge bg-danger-subtle text-danger rounded-pill px-2">Inactive</span>
                                        </td>
                                        <td class="text-end pe-4 py-3">
                                            <a th:href="@{/master-data/clients/{id}/dashboard(id=${client.id})}"
                                                class="btn btn-primary btn-sm rounded-1 me-1" title="Dashboard">
                                                <i class="fas fa-chart-bar"></i>
                                            </a>
                                            <button class="btn btn-outline-secondary btn-sm rounded-1 me-1"
                                                data-bs-toggle="modal" data-bs-target="#editClientModal"
                                                th:data-id="${client.id}" th:data-code="${client.code}"
                                                th:data-name="${client.name}" th:data-address="${client.address}"
                                                title="Edit">
                                                <i class="fas fa-edit"></i>
                                            </button>
                                            <form th:action="@{/master-data/clients/{id}/toggle(id=${client.id})}"
                                                method="post" class="d-inline">
                                                <button type="submit" class="btn btn-outline-warning btn-sm rounded-1"
                                                    th:title="${client.active ? 'Deactivate' : 'Activate'}">
                                                    <i
                                                        th:class="${client.active ? 'fas fa-ban' : 'fas fa-check-circle'}"></i>
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(clients)}">
                                        <td colspan="6" class="text-center text-muted py-5 small">
                                            <i class="fas fa-inbox fa-3x mb-3 opacity-25"></i>
                                            <p class="mb-0">No clients found</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Add Client Modal -->
            <div class="modal fade" id="addClientModal" tabindex="-1" aria-labelledby="addClientModalLabel"
                aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content rounded-1 border-0 shadow">
                        <div class="modal-header border-bottom-0 pb-0">
                            <h5 class="modal-title fw-bold text-dark" id="addClientModalLabel">
                                <i class="fas fa-plus-circle me-2 text-primary"></i>Add New Client
                            </h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <form th:action="@{/master-data/clients}" th:object="${newClient}" method="post">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="clientCode" class="form-label small fw-semibold text-secondary">Client
                                        Code</label>
                                    <input type="text" class="form-control rounded-1" id="clientCode" th:field="*{code}"
                                        placeholder="e.g., CLI001" required>
                                </div>
                                <div class="mb-3">
                                    <label for="clientName" class="form-label small fw-semibold text-secondary">Client
                                        Name</label>
                                    <input type="text" class="form-control rounded-1" id="clientName" th:field="*{name}"
                                        placeholder="e.g., ABC Corporation" required>
                                </div>
                                <div class="mb-3">
                                    <label for="clientAddress"
                                        class="form-label small fw-semibold text-secondary">Address
                                        (Optional)</label>
                                    <input type="text" class="form-control rounded-1" id="clientAddress"
                                        th:field="*{address}" placeholder="e.g., 123 Main Street">
                                </div>
                            </div>
                            <div class="modal-footer border-top-0 pt-0">
                                <button type="button" class="btn btn-outline-secondary rounded-1"
                                    data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary rounded-1">
                                    <i class="fas fa-save me-2"></i>Save Client
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Edit Client Modal -->
            <div class="modal fade" id="editClientModal" tabindex="-1" aria-labelledby="editClientModalLabel"
                aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content rounded-1 border-0 shadow">
                        <div class="modal-header border-bottom-0 pb-0">
                            <h5 class="modal-title fw-bold text-dark" id="editClientModalLabel">
                                <i class="fas fa-edit me-2 text-warning"></i>Edit Client
                            </h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <form action="/master-data/clients/update" method="post">
                            <input type="hidden" id="editId" name="id">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="editCode" class="form-label small fw-semibold text-secondary">Client
                                        Code</label>
                                    <input type="text" class="form-control rounded-1" id="editCode" name="code"
                                        required>
                                </div>
                                <div class="mb-3">
                                    <label for="editName" class="form-label small fw-semibold text-secondary">Client
                                        Name</label>
                                    <input type="text" class="form-control rounded-1" id="editName" name="name"
                                        required>
                                </div>
                                <div class="mb-3">
                                    <label for="editAddress" class="form-label small fw-semibold text-secondary">Address
                                        (Optional)</label>
                                    <input type="text" class="form-control rounded-1" id="editAddress" name="address">
                                </div>
                            </div>
                            <div class="modal-footer border-top-0 pt-0">
                                <button type="button" class="btn btn-outline-secondary rounded-1"
                                    data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary rounded-1">
                                    <i class="fas fa-save me-2"></i>Update Client
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
    </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Modal data population for edit
            const editClientModal = document.getElementById('editClientModal');
            if (editClientModal) {
                editClientModal.addEventListener('show.bs.modal', function (event) {
                    const button = event.relatedTarget;
                    const id = button.getAttribute('data-id');
                    const code = button.getAttribute('data-code');
                    const name = button.getAttribute('data-name');
                    const address = button.getAttribute('data-address');

                    const form = editClientModal.querySelector('form');
                    // form.action no longer needs dynamic update based on ID

                    if (editClientModal.querySelector('#editId')) editClientModal.querySelector('#editId').value = id;
                    if (editClientModal.querySelector('#editCode')) editClientModal.querySelector('#editCode').value = code;
                    if (editClientModal.querySelector('#editName')) editClientModal.querySelector('#editName').value = name;
                    if (editClientModal.querySelector('#editAddress')) editClientModal.querySelector('#editAddress').value = address || '';
                });
            }
        });
    </script>

</body>

</html>
