<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Payment Methods</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'master-data-methods')}">
        <section>
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold text-gradient-primary">Manage Payment Methods</h2>
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${successMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="card shadow-sm mb-4 border-0">
                        <div class="card-header bg-light border-bottom-0 py-3">
                            <h6 class="mb-0 fw-bold text-primary"><i class="fas fa-plus-circle me-2"></i>Add New Method
                            </h6>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/master-data/payment-methods}" th:object="${newMethod}" method="post"
                                class="row g-3 align-items-end">
                                <div class="col-md-5">
                                    <label class="form-label small fw-bold text-secondary">Method Name</label>
                                    <input type="text" class="form-control" th:field="*{methodName}" required
                                        placeholder="Name (e.g. Zelle)">
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label small fw-bold text-secondary">Description
                                        (Optional)</label>
                                    <input type="text" class="form-control" th:field="*{description}"
                                        placeholder="Description">
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-1"></i>
                                        Save</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="bg-light text-uppercase small text-secondary">
                                        <tr>
                                            <th class="ps-4">ID</th>
                                            <th>Method Name</th>
                                            <th>Description</th>
                                            <th>Status</th>
                                            <th class="text-end pe-4">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="m : ${methods}">
                                            <td class="ps-4 fw-bold" th:text="${m.id}"></td>
                                            <td class="fw-bold" th:text="${m.methodName}"></td>
                                            <td th:text="${m.description}"></td>
                                            <td>
                                                <span class="badge bg-success" th:if="${m.active}">Active</span>
                                                <span class="badge bg-secondary" th:unless="${m.active}">Inactive</span>
                                            </td>
                                            <td class="text-end pe-4">
                                                <a th:href="@{/master-data/payment-methods/{id}/dashboard(id=${m.id})}"
                                                    class="btn btn-sm btn-primary rounded-1 me-1"
                                                    title="View Dashboard">
                                                    <i class="fas fa-chart-bar"></i>
                                                </a>
                                                <button type="button"
                                                    class="btn btn-sm btn-outline-secondary rounded-1 me-1"
                                                    th:data-id="${m.id}" th:data-name="${m.methodName}"
                                                    th:data-desc="${m.description}" onclick="openEditMethodModal(this)"
                                                    title="Edit">
                                                    <i class="fas fa-edit"></i>
                                                </button>
                                                <form
                                                    th:action="@{/master-data/payment-methods/{id}/toggle(id=${m.id})}"
                                                    method="post" class="d-inline">
                                                    <button type="submit" class="btn btn-sm rounded-1"
                                                        th:classappend="${m.active} ? 'btn-outline-danger' : 'btn-outline-success'"
                                                        th:title="${m.active} ? 'Deactivate' : 'Activate'">
                                                        <i class="fas"
                                                            th:classappend="${m.active} ? 'fa-ban' : 'fa-check-circle'"></i>
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(methods)}">
                                            <td colspan="4" class="text-center py-4 text-muted">No methods found.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Edit Method Modal -->
                <div class="modal fade" id="editMethodModal" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Edit Payment Method</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <form th:action="@{/master-data/payment-methods/update}" method="post">
                                <div class="modal-body">
                                    <input type="hidden" id="editMethodId" name="id">
                                    <div class="mb-3">
                                        <label class="form-label">Method Name</label>
                                        <input type="text" class="form-control" id="editMethodName" name="methodName"
                                            required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Description</label>
                                        <input type="text" class="form-control" id="editMethodDesc" name="description">
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">Close</button>
                                    <button type="submit" class="btn btn-primary">Save Changes</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script>
            function openEditMethodModal(btn) {
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name');
                const desc = btn.getAttribute('data-desc');

                document.getElementById('editMethodId').value = id;
                document.getElementById('editMethodName').value = name;
                document.getElementById('editMethodDesc').value = (desc && desc !== 'null') ? desc : '';
                new bootstrap.Modal(document.getElementById('editMethodModal')).show();
            }
        </script>
    </div>
</body>

</html>
