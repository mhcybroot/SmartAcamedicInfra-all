<!DOCTYPE html>
<html>

<head>
    <title>Connection Error - Productivity Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #dc3545;
            margin-bottom: 1rem;
        }

        p {
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            vertical-align: middle;
            user-select: none;
            border: 1px solid transparent;
            padding: 0.5rem 1rem;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: 0.25rem;
            transition: color 0.15s, background-color 0.15s, border-color 0.15s;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary {
            color: #fff;
            background-color: #0d6efd;
            border-color: #0d6efd;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
        }

        code {
            background-color: #f1f3f5;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            color: #e83e8c;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Connection Failed</h1>
        <p>The extension cannot communicate with the Productivity Tracker server.</p>
        <p>
            <strong>Server URL:</strong> <code id="serverUrl">Loading...</code>
        </p>
        <p class="small text-muted">
            Please check that the server is running and accessible from this computer.
            If the IP address has changed, update it in the configuration.
        </p>
        <button id="retryBtn" class="btn btn-primary">Retry Connection</button>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('serverUrl').textContent = SERVER_URL || 'Unknown';

        document.getElementById('retryBtn').addEventListener('click', async () => {
            try {
                const retryBtn = document.getElementById('retryBtn');
                retryBtn.textContent = 'Checking...';
                retryBtn.disabled = true;

                // Simple health check (fetching blocked sites is a good proxy)
                const response = await fetch(`${SERVER_URL}/api/blocked-sites?deviceId=health_check`);

                if (response.ok) {
                    // Success!
                    alert("Connection successful! You can close this tab.");
                    window.close();
                } else {
                    throw new Error("Server returned " + response.status);
                }
            } catch (error) {
                alert("Connection failed: " + error.message);
                const retryBtn = document.getElementById('retryBtn');
                retryBtn.textContent = 'Retry Connection';
                retryBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
