spring.application.name=watch-employee
spring.datasource.url=jdbc:postgresql://localhost:5432/employee_watch
server.port=8565
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Custom API Key for Extension Security
app.activity.api-key=productivity-secret-key-2024

# AES-256 encryption key for credential passwords (32 characters)
app.credential.encryption-key=WatchEmp-SecretKey-2024-AES256!!

# Enable Spring Security Debug Logging to diagnose 403 Forbidden errors
logging.level.org.springframework.security=DEBUG

# Isolate session cookie to prevent collisions on localhost
server.servlet.session.cookie.name=WATCH_SESSIONID