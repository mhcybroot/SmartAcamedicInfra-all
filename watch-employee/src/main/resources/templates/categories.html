<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'categories')}">

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark">Domain Categories</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addCategoryModal">
                <i class="bi bi-plus-circle"></i> Add Classification
            </button>
        </div>

        <div class="card-custom">
            <div class="table-responsive">
                <table class="table-custom">
                    <thead>
                        <tr>
                            <th>Domain</th>
                            <th>Classification</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td><code class="text-primary fw-bold" th:text="${cat.domain}">domain.com</code></td>
                            <td>
                                <span th:class="'badge-custom ' + 
                                    (${cat.category == 'Productive'} ? 'badge-success' : 
                                    (${cat.category == 'Unproductive'} ? 'badge-danger' : 'badge-neutral'))"
                                    th:text="${cat.category}">Category</span>
                            </td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-danger" th:data-domain="${cat.domain}"
                                    onclick="confirmDelete(this)" data-bs-toggle="modal" data-bs-target="#deleteModal">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Modal -->
        <div class="modal fade" id="addCategoryModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/admin/categories}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold">Classify Domain</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label small text-muted fw-bold">Domain</label>
                                <input type="text" class="form-control" name="domain"
                                    placeholder="e.g. workspace.google.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-muted fw-bold">Classification</label>
                                <select class="form-select" name="category">
                                    <option value="Productive">Productive</option>
                                    <option value="Neutral" selected>Neutral</option>
                                    <option value="Unproductive">Unproductive</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary-custom">Save Classification</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Delete Modal -->
        <div class="modal fade" id="deleteModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/admin/categories/delete}" method="post">
                        <input type="hidden" id="deleteDomain" name="domain">
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold">Remove Classification</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <p>Are you sure you want to remove classification for <strong
                                    id="deleteDisplayDomain"></strong>?</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-danger">Remove</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            function confirmDelete(btn) {
                const domain = btn.getAttribute('data-domain');
                document.getElementById('deleteDomain').value = domain;
                document.getElementById('deleteDisplayDomain').textContent = domain;
            }
        </script>
    </div>
</body>

</html>
