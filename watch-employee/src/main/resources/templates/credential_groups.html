<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'credential-groups')}">

<head>
    <title>Credential Groups</title>
</head>

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark">Credential Groups</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#createGroupModal">
                <i class="bi bi-plus-lg"></i> Create Group
            </button>
        </div>

        <!-- Groups List -->
        <div th:each="gd : ${groupDetails}" class="card-custom mb-4">
            <div class="card-header-custom d-flex justify-content-between align-items-center">
                <div>
                    <i class="bi bi-collection"></i>
                    <span class="fw-bold" th:text="${gd.group.name}">Group Name</span>
                    <span class="badge bg-primary ms-2" th:text="${gd.credentialCount + ' credentials'}">0
                        credentials</span>
                    <span class="badge bg-success ms-1" th:text="${gd.deviceCount + ' devices'}">0 devices</span>
                </div>
                <div>
                    <button class="btn btn-sm btn-outline-primary me-1" th:data-id="${gd.group.id}"
                        th:data-name="${gd.group.name}" th:data-desc="${gd.group.description}"
                        onclick="openEditGroupModal(this)" data-bs-toggle="modal" data-bs-target="#editGroupModal">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" th:data-id="${gd.group.id}"
                        th:data-name="${gd.group.name}" onclick="openDeleteGroupModal(this)" data-bs-toggle="modal"
                        data-bs-target="#deleteGroupModal">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
            <div class="p-3">
                <p class="text-muted small mb-3" th:if="${gd.group.description != null}"
                    th:text="${gd.group.description}">Description</p>

                <div class="row g-3">
                    <!-- Assign Credentials -->
                    <div class="col-md-6">
                        <form th:action="'/admin/credential-groups/' + ${gd.group.id} + '/assign'" method="post">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
                            <label class="form-label small fw-bold"><i class="bi bi-key"></i> Assigned
                                Credentials:</label>
                            <select name="credentialIds" class="form-select form-select-sm mb-2" multiple
                                style="height: 120px;">
                                <option th:each="c : ${allCredentials}" th:value="${c.id}"
                                    th:text="${c.siteName + ' (' + c.username + ')'}"
                                    th:selected="${gd.assignedCredentialIds.contains(c.id)}">
                                    Credential
                                </option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-check-lg"></i> Update Credentials
                            </button>
                        </form>
                    </div>

                    <!-- Assign Devices -->
                    <div class="col-md-6">
                        <form th:action="'/admin/credential-groups/' + ${gd.group.id} + '/access'" method="post">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
                            <label class="form-label small fw-bold"><i class="bi bi-laptop"></i> Device Access:</label>
                            <select name="deviceIds" class="form-select form-select-sm mb-2" multiple
                                style="height: 120px;">
                                <option th:each="emp : ${allEmployees}" th:value="${emp.deviceId}"
                                    th:text="${emp.deviceId + (emp.name != null ? ' - ' + emp.name : '')}"
                                    th:selected="${gd.assignedDeviceIds.contains(emp.deviceId)}">
                                    Device
                                </option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-success">
                                <i class="bi bi-check-lg"></i> Update Access
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${groupDetails.empty}" class="card-custom">
            <div class="p-4 text-center text-muted">
                No groups created yet. Click "Create Group" to get started.
            </div>
        </div>

        <!-- Create Group Modal -->
        <div class="modal fade" id="createGroupModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form action="/admin/credential-groups" method="post">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold"><i class="bi bi-plus-lg"></i> Create Group</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Group Name *</label>
                                <input type="text" class="form-control" name="name" required
                                    placeholder="e.g. Marketing Tools">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Description</label>
                                <textarea class="form-control" name="description" rows="2"
                                    placeholder="Optional description"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary-custom">Create Group</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Edit Group Modal -->
        <div class="modal fade" id="editGroupModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form id="editGroupForm" method="post">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold">Edit Group</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Group Name *</label>
                                <input type="text" class="form-control" name="name" id="editGroupName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Description</label>
                                <textarea class="form-control" name="description" id="editGroupDesc"
                                    rows="2"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary-custom">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Delete Group Modal -->
        <div class="modal fade" id="deleteGroupModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form id="deleteGroupForm" method="post">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold">Delete Group</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <p>Delete group <strong id="deleteGroupName"></strong>?</p>
                            <p class="text-danger small"><i class="bi bi-exclamation-triangle"></i> This will remove
                                all credential assignments and device access for this group.</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            function openEditGroupModal(btn) {
                const id = btn.getAttribute('data-id');
                document.getElementById('editGroupForm').action = `/admin/credential-groups/${id}/edit`;
                document.getElementById('editGroupName').value = btn.getAttribute('data-name') || '';
                document.getElementById('editGroupDesc').value = btn.getAttribute('data-desc') || '';
            }

            function openDeleteGroupModal(btn) {
                const id = btn.getAttribute('data-id');
                document.getElementById('deleteGroupForm').action = `/admin/credential-groups/${id}/delete`;
                document.getElementById('deleteGroupName').textContent = btn.getAttribute('data-name');
            }
        </script>
    </div>
</body>

</html>
