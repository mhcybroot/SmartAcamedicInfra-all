<!DOCTYPE html>
<html th:fragment="layout(content, activePage)" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Student</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <!-- Theme Initialization Script -->
    <script>
        const currTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currTheme);
    </script>

    <!-- Smart Academic Infrastructure Unified Theme Injection -->
    <link rel="stylesheet" th:href="@{/css/smart-academic-theme.css}">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.self !== window.top || window.location.search.includes('embedded=true')) {
                document.documentElement.classList.add('embedded-mode');
                
                // Configure global Chart.js defaults for dark theme
                if (typeof Chart !== 'undefined') {
                    Chart.defaults.color = '#e2f5ed';
                    Chart.defaults.borderColor = 'rgba(16, 185, 129, 0.15)';
                }
            }
        });
    </script>
</head>


<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-stopwatch"></i> Watch Student
        </div>
        <nav class="sidebar-nav">
            <a href="/admin" class="nav-item" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                <i class="bi bi-grid-1x2-fill"></i> Dashboard
            </a>
            <a href="/admin/devices" class="nav-item" th:classappend="${activePage == 'devices' ? 'active' : ''}">
                <i class="bi bi-laptop"></i> Devices
            </a>
            <a href="/admin/categories" class="nav-item" th:classappend="${activePage == 'categories' ? 'active' : ''}">
                <i class="bi bi-tags"></i> Domain Categories
            </a>
            <a href="/admin/users" class="nav-item" th:classappend="${activePage == 'users' ? 'active' : ''}">
                <i class="bi bi-people"></i> Admin Management
            </a>
            <a href="/admin/credentials" class="nav-item"
                th:classappend="${activePage == 'credentials' ? 'active' : ''}">
                <i class="bi bi-key"></i> Credentials
            </a>
            <a href="/admin/credential-groups" class="nav-item"
                th:classappend="${activePage == 'credential-groups' ? 'active' : ''}">
                <i class="bi bi-collection"></i> Credential Groups
            </a>
            <a href="/admin/blocking" class="nav-item" th:classappend="${activePage == 'blocking' ? 'active' : ''}">
                <i class="bi bi-shield-lock"></i> Blocking
            </a>
        </nav>


        <div class="sidebar-footer p-3 border-top">
            <div class="d-flex align-items-center mb-3">
                <button id="themeToggle"
                    class="btn btn-sm btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2"
                    style="border-radius: 0.5rem;">
                    <i class="bi bi-moon-stars"></i> <span id="themeLabel">Dark Mode</span>
                </button>
            </div>
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
                        style="width: 32px; height: 32px;">
                        A
                    </div>
                    <div>
                        <div class="small fw-bold">Admin</div>
                        <div class="small text-muted" style="font-size: 0.7rem;">Administrator</div>
                    </div>
                </div>
                <form th:action="@{/logout}" method="post" id="logoutForm" style="display: none;"></form>
                <a href="javascript:document.getElementById('logoutForm').submit();"
                    class="btn btn-sm btn-outline-danger" style="border-radius: 0.5rem; font-size: 0.7rem;"
                    title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <th:block th:replace="${content}"></th:block>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Theme Toggle Script -->
    <script>
        const btn = document.getElementById('themeToggle');
        const themeLabel = document.getElementById('themeLabel');

        function updateUI(theme) {
            if (theme === 'dark') {
                themeLabel.textContent = 'Light Mode';
                btn.querySelector('i').className = 'bi bi-sun';
            } else {
                themeLabel.textContent = 'Dark Mode';
                btn.querySelector('i').className = 'bi bi-moon-stars';
            }
        }

        const initialTheme = localStorage.getItem('theme') || 'light';
        updateUI(initialTheme);

        btn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateUI(newTheme);
        });
    </script>

</body>

</html>
