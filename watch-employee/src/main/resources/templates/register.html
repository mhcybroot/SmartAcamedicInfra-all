<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register - Productivity Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Smart Academic Infrastructure Unified Theme Injection -->
    <link rel="stylesheet" th:href="@{/css/smart-academic-theme.css}">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.self !== window.top || window.location.search.includes('embedded=true')) {
                document.documentElement.classList.add('embedded-mode');
            }
        });
    </script>
    <style>
        :root {
            --primary: #10b981; /* Emerald Green */
            --primary-hover: #059669;
            --bg: #051e14; /* Deep dark green */
        }

        body {
            background: radial-gradient(circle at top right, #093c29 0%, #03150d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #e2f5ed;
        }

        html.embedded-mode body {
            background: transparent !important;
        }

        .login-card {
            background: rgba(16, 185, 129, 0.06) !important;
            border: 1px solid rgba(16, 185, 129, 0.2) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            color: #e2f5ed !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            border-radius: 1.5rem;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1.5rem;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            border: 1px solid rgba(16, 185, 129, 0.4);
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .btn-primary-custom:hover {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .form-control {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(16, 185, 129, 0.2) !important;
            color: #e2f5ed !important;
        }

        .form-control::placeholder {
            color: rgba(226, 245, 237, 0.4) !important;
        }

        .form-control:focus {
            border-color: #10b981 !important;
            background: rgba(255, 255, 255, 0.05) !important;
            color: #e2f5ed !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2) !important;
        }

        .text-muted {
            color: #a7f3d0 !important;
        }

        a {
            color: #f59e0b !important;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            color: #fbbf24 !important;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo"><i class="bi bi-person-plus"></i></div>
        <h2 class="text-center fw-bold mb-1">Sign Up</h2>
        <p class="text-center text-muted mb-4 small">Create a new admin account</p>

        <div th:if="${error}" class="alert alert-danger py-2 small" role="alert" th:text="${error}">
            Error message here.
        </div>

        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">Username</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">Email</label>
                <input type="email" name="email" class="form-control" placeholder="admin@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary-custom mb-3">Register</button>
            <div class="text-center">
                <p class="small text-muted mb-0">Already have an account? <a href="/login"
                        class="text-primary text-decoration-none fw-bold">Login here</a></p>
            </div>
        </form>
    </div>
</body>

</html>
